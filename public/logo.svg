<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#6366F1" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0.80"/>
    </linearGradient>
    <radialGradient id="shine" cx="28%" cy="22%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.40"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="refract" cx="70%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="atop" result="glow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="glow"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="44" height="44" rx="14" ry="14" fill="url(#g1)" filter="url(#softglow)"/>
  <rect x="2" y="2" width="44" height="44" rx="14" ry="14" fill="url(#shine)"/>
  <rect x="2" y="2" width="44" height="44" rx="14" ry="14" fill="url(#refract)"/>
  <rect x="2.5" y="2.5" width="43" height="43" rx="13.5" ry="13.5" fill="none" stroke="url(#g2)" stroke-width="0.8"/>

  <line x1="6" y1="6" x2="14" y2="10" stroke="white" stroke-width="0.3" opacity="0.15"/>
  <line x1="42" y1="8" x2="36" y2="14" stroke="white" stroke-width="0.3" opacity="0.12"/>
  <line x1="8" y1="40" x2="16" y2="34" stroke="white" stroke-width="0.2" opacity="0.10"/>

  <g transform="translate(24, 22)" filter="url(#glow)">
    <rect x="-3.8" y="-9.5" width="7.6" height="19" rx="3.8" fill="none" stroke="url(#micGrad)" stroke-width="1.6" opacity="0.95"/>
    <line x1="-1.8" y1="-4" x2="1.8" y2="-4" stroke="white" stroke-width="0.6" opacity="0.25" stroke-linecap="round"/>
    <line x1="-1.8" y1="-1.5" x2="1.8" y2="-1.5" stroke="white" stroke-width="0.6" opacity="0.20" stroke-linecap="round"/>
    <path d="M-8.5 2.5 C-8.5 7.5, -4.5 11.5, 0 11.5 C4.5 11.5, 8.5 7.5, 8.5 2.5" fill="none" stroke="url(#micGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="0" y1="11.5" x2="0" y2="15.5" stroke="url(#micGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
    <line x1="-4.5" y1="15.5" x2="4.5" y2="15.5" stroke="url(#micGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  </g>

  <g opacity="0.50" transform="translate(24, 22)">
    <path d="M-14 -1.5 Q-13 -5, -11 -2.5 Q-9 0, -11 2.5 Q-13 5, -14 1.5" fill="none" stroke="url(#g3)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M-17.5 -3.5 Q-15.5 -8, -13.5 -4.5 Q-11.5 -1, -13.5 4 Q-15.5 8, -17.5 3.5" fill="none" stroke="url(#g3)" stroke-width="1.0" stroke-linecap="round" opacity="0.7"/>
    <path d="M-20.5 -5 Q-18 -10, -16 -6 Q-14 -2, -16 5.5 Q-18 10, -20.5 5" fill="none" stroke="url(#g3)" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
    <path d="M14 -1.5 Q13 -5, 11 -2.5 Q9 0, 11 2.5 Q13 5, 14 1.5" fill="none" stroke="url(#g3)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M17.5 -3.5 Q15.5 -8, 13.5 -4.5 Q11.5 -1, 13.5 4 Q15.5 8, 17.5 3.5" fill="none" stroke="url(#g3)" stroke-width="1.0" stroke-linecap="round" opacity="0.7"/>
    <path d="M20.5 -5 Q18 -10, 16 -6 Q14 -2, 16 5.5 Q18 10, 20.5 5" fill="none" stroke="url(#g3)" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
  </g>

  <circle cx="10" cy="10" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="38" cy="38" r="0.8" fill="white" opacity="0.08"/>
  <circle cx="36" cy="12" r="0.6" fill="white" opacity="0.10"/>
</svg>
